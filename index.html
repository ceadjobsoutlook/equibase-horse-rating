<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Gen Racing Scout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'equibase-green': '#0f6130',
                        'equibase-accent': '#8db92e',
                        'equibase-light': '#f4f6f4'
                    }
                }
            }
        }
    </script>
    <style>
        .stat-table th, .stat-table td {
            border-bottom: 1px solid #e5e7eb;
            padding: 0.25rem;
            text-align: center;
        }

        .stat-table th {
            background-color: #f4f6f4;
            font-size: 0.65rem;
            text-transform: uppercase;
            color: #0f6130;
            border-bottom: 2px solid #0f6130;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen font-sans">

    <header class="bg-equibase-green text-white border-b-4 border-equibase-accent shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-2xl md:text-3xl font-serif font-bold tracking-tight">Scouting & Biometrics</h1>
                <p class="text-[10px] md:text-xs text-equibase-accent font-black tracking-widest uppercase mt-1">Advanced GPS Metrics Dashboard</p>
            </div>
            <div class="hidden md:block text-right">
                <span class="bg-white text-equibase-green text-xs font-bold px-3 py-1 rounded shadow uppercase tracking-wider">
                    Live Data Feed
                </span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-6 py-8">
        <div class="bg-white p-4 md:p-6 border border-gray-300 shadow-sm mb-8 border-l-4 border-l-equibase-green">
            <div class="w-full md:w-1/2">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Select Upcoming Race</label>
                <select id="raceSelector" disabled class="w-full p-2 border border-gray-300 bg-gray-50 text-gray-800 font-semibold focus:outline-none focus:border-equibase-green focus:ring-1 focus:ring-equibase-green disabled:opacity-50">
                    <option value="">Loading Data...</option>
                </select>
            </div>
        </div>

        <div id="cardGrid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        </div>
    </main>

    <script>
        let horseData = [];
        let validImageUrls = {};

        // Helper: Converts Excel serial (46106) to JS Date
        function excelToDate(excelDate) {
            if (typeof excelDate === 'string') return excelDate; // Fallback if already string
            return new Date((excelDate - 25569) * 86400 * 1000);
        }

        // Helper: Consistent Race Key generator
        function getRaceKey(horse) {
            const dateObj = excelToDate(horse.race_date);
            const dateStr = dateObj instanceof Date && !isNaN(dateObj)
                ? dateObj.toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                : "Unknown Date";
            return `${horse.track_id} - ${dateStr} - Race ${horse.race_number}`;
        }

        // 1. Fetch JSON
        fetch('./races.json')
            .then(response => response.json())
            .then(data => {
                horseData = data.filter(h => h.OVR !== "No GPS Data");
                preloadImagesAndInitialize();
            })
            .catch(err => {
                console.error(err);
                document.getElementById('raceSelector').innerHTML = '<option value="">Error loading JSON</option>';
            });

        // 2. Try to find local images
        async function preloadImagesAndInitialize() {
            const uniqueHorses = [...new Set(horseData.map(h => h.horse_name))];

            const imagePromises = uniqueHorses.map(name => {
                return new Promise(resolve => {
                    const formats = [
                        name.toLowerCase().trim(),
                        name.toLowerCase().replace(/[^a-z0-9]/g, ''),
                        name.replace(/\s+/g, '_').toLowerCase()
                    ];

                    let tryIndex = 0;
                    function attemptNext() {
                        if (tryIndex >= formats.length) return resolve();

                        const img = new Image();
                        const testUrl = `./images/${formats[tryIndex]}.png`;
                        img.onload = () => { validImageUrls[name] = testUrl; resolve(); };
                        img.onerror = () => { tryIndex++; attemptNext(); };
                        img.src = testUrl;
                    }
                    attemptNext();
                });
            });

            await Promise.all(imagePromises);
            buildDropdown();
        }

        // 3. Build Dropdown
        function buildDropdown() {
            const raceMap = {};

            horseData.forEach(h => {
                const key = getRaceKey(h);
                if (!raceMap[key]) {
                    raceMap[key] = { key: key, photoCount: 0, totalHorses: 0 };
                }
                raceMap[key].totalHorses++;
                if (validImageUrls[h.horse_name]) raceMap[key].photoCount++;
            });

            const sortedRaces = Object.values(raceMap).sort((a, b) => b.photoCount - a.photoCount);

            const selector = document.getElementById('raceSelector');
            selector.innerHTML = '<option value="">-- Select a Race --</option>';

            sortedRaces.forEach(r => {
                const photoLabel = r.photoCount > 0 ? `(${r.photoCount} Photos)` : '';
                selector.innerHTML += `<option value="${r.key}">${r.key} ${photoLabel}</option>`;
            });

            selector.disabled = false;
            selector.addEventListener('change', (e) => renderCards(e.target.value));

            // Auto-load first race
            if (sortedRaces.length > 0) {
                selector.value = sortedRaces[0].key;
                renderCards(sortedRaces[0].key);
            }
        }

        // 4. Render Cards (Side-by-Side Mobile Fix)
        function renderCards(selectedKey) {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';

            const filtered = horseData.filter(h => getRaceKey(h) === selectedKey);
            filtered.sort((a, b) => parseInt(b.OVR) - parseInt(a.OVR));

            filtered.forEach(horse => {
                const imageUrl = validImageUrls[horse.horse_name];

                const imageBox = imageUrl
                    ? `<img src="${imageUrl}" class="absolute inset-0 w-full h-full object-contain p-2">`
                    : `<div class="absolute inset-0 flex flex-col items-center justify-center text-gray-300">
                            <svg class="w-8 h-8 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2-2v12a2 2 0 002 2z"></path></svg>
                            <span class="text-[10px] font-bold uppercase">No Photo</span>
                           </div>`;

                const badges = horse.Tags.split(',').map(tag => {
                    if (tag.trim() === "N/A" || tag.trim() === "Standard Prospect") return '';
                    return `<span class="bg-equibase-light text-equibase-green px-1.5 py-0.5 rounded text-[10px] font-bold border border-equibase-green whitespace-nowrap">${tag.trim()}</span>`;
                }).join('');

                grid.innerHTML += `
                        <div class="bg-white border border-gray-300 shadow-sm flex flex-row overflow-hidden hover:shadow-md transition-shadow relative min-h-[150px]">
                            <div class="absolute top-0 left-0 bg-equibase-green text-white text-lg font-black px-2 py-1 border-b-2 border-r-2 border-equibase-accent z-10 shadow-sm">
                                ${horse.OVR}
                            </div>
                            <div class="w-[35%] border-r border-gray-100 relative bg-gray-50 flex-shrink-0">
                                ${imageBox}
                            </div>
                            <div class="w-[65%] p-3 flex flex-col justify-center">
                                <h2 class="text-lg md:text-xl font-black uppercase text-gray-900 leading-tight">${horse.horse_name}</h2>
                                <p class="text-[10px] md:text-xs text-equibase-green font-bold italic mb-2">${horse.Archetype}</p>
                                <table class="w-full stat-table mb-2">
                                    <thead>
                                        <tr>
                                            <th>SPD</th><th>STR</th><th>STA</th><th>EFF</th><th>CLS</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr class="font-bold text-xs md:text-sm">
                                            <td>${horse.SPD}</td><td>${horse.STR}</td><td>${horse.STA}</td><td>${horse.EFF}</td><td>${horse.CLS}</td>
                                        </tr>
                                    </tbody>
                                </table>
                                <div class="flex flex-wrap gap-1">${badges}</div>
                            </div>
                        </div>
                    `;
            });
        }
    </script>
</body>
</html>
