<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Gen Racing Scout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .card-gold { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7); color: #1a202c; }
        .card-silver { background: linear-gradient(135deg, #e3e3e3, #ffffff, #c7c7c7); color: #1a202c; }
        .card-bronze { background: linear-gradient(135deg, #cd7f32, #f5d087, #a0522d); color: #ffffff; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen p-6 font-sans">

    <div class="max-w-6xl mx-auto">
        <header class="mb-8 border-b border-gray-700 pb-4">
            <h1 class="text-4xl font-black uppercase tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
                Next-Gen Roster
            </h1>
            <p class="text-gray-400 mt-2">Live GPS Biometric Scouting</p>
        </header>

        <div class="mb-8">
            <label class="block text-sm font-bold mb-2 text-gray-300">Select Upcoming Race:</label>
            <select id="raceSelector" class="w-full md:w-1/3 p-3 bg-gray-800 border border-gray-600 rounded text-white font-bold focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="">Loading races...</option>
            </select>
        </div>

        <div id="cardGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </div>

    <script>
        let horseData = [];

        // Load the JSON data
        fetch('./races.json') 
    	    .then(response => response.json())
            .then(data => {
                horseData = data.filter(h => h.OVR !== "No GPS Data"); // Only show scouted horses
                populateDropdown();
            });

        function populateDropdown() {
            const selector = document.getElementById('raceSelector');
            // Get unique races (Track + Date + Race Num)
            const races = [...new Set(horseData.map(h => `${h.track_id} - Race ${h.race_number} (${h.race_date})`))];
            
            selector.innerHTML = '<option value="">-- Choose a Race --</option>';
            races.forEach(race => {
                selector.innerHTML += `<option value="${race}">${race}</option>`;
            });

            selector.addEventListener('change', (e) => renderCards(e.target.value));
        }

        function renderCards(selectedRace) {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = ''; // Clear current cards

            const filteredHorses = horseData.filter(h => 
                `${h.track_id} - Race ${h.race_number} (${h.race_date})` === selectedRace
            );

            filteredHorses.forEach(horse => {
                // Determine Card Tier based on OVR
                let theme = 'card-bronze';
                if (horse.OVR >= 90) theme = 'card-gold';
                else if (horse.OVR >= 80) theme = 'card-silver';

                // Format Badges
                const badges = horse.Tags.split(',').map(tag => 
                    `<span class="px-2 py-1 bg-black bg-opacity-30 rounded-full text-xs font-bold uppercase mr-1">${tag.trim()}</span>`
                ).join('');

                const cardHTML = `
                    <div class="${theme} rounded-xl shadow-2xl p-6 transform transition duration-300 hover:scale-105 hover:shadow-3xl border border-gray-800">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h2 class="text-5xl font-black tracking-tighter">${horse.OVR}</h2>
                                <p class="text-sm font-bold uppercase tracking-widest opacity-80">OVR</p>
                            </div>
                            <div class="text-right">
                                <h3 class="text-xl font-black uppercase tracking-wide leading-tight">${horse.horse_name}</h3>
                                <p class="text-sm font-bold italic opacity-80">${horse.Archetype}</p>
                            </div>
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 mb-4 border-t border-b border-black border-opacity-20 py-4">
                            <div><span class="font-bold">SPD</span> <span class="float-right text-lg font-black">${horse.SPD}</span></div>
                            <div><span class="font-bold">STR</span> <span class="float-right text-lg font-black">${horse.STR}</span></div>
                            <div><span class="font-bold">STA</span> <span class="float-right text-lg font-black">${horse.STA}</span></div>
                            <div><span class="font-bold">EFF</span> <span class="float-right text-lg font-black">${horse.EFF}</span></div>
                            <div class="col-span-2"><span class="font-bold">CLASS</span> <span class="float-right text-lg font-black">${horse.CLS}</span></div>
                        </div>

                        <div class="flex flex-wrap mt-2">
                            ${badges}
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }
    </script>
</body>
</html>
