<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Next-Gen Racing Scout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'equibase-green': '#0f6130',
                        'equibase-accent': '#8db92e',
                        'equibase-light': '#f4f6f4'
                    }
                }
            }
        }
    </script>
    <style>
        /* Clean table borders for data */
        .stat-table th, .stat-table td {
            border-bottom: 1px solid #e5e7eb;
            padding: 0.5rem;
            text-align: center;
        }

        .stat-table th {
            background-color: #f4f6f4;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #0f6130;
            border-bottom: 2px solid #0f6130;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen font-sans">

    <header class="bg-equibase-green text-white border-b-4 border-equibase-accent shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-serif font-bold tracking-tight text-white">Scouting & Biometrics</h1>
                <p class="text-xs text-equibase-accent font-black tracking-widest uppercase mt-1">Advanced GPS Metrics Dashboard</p>
            </div>
            <div class="hidden md:block text-right">
                <span class="bg-white text-equibase-green text-xs font-bold px-3 py-1 rounded shadow uppercase tracking-wider">
                    Live Data Feed
                </span>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">

        <div class="bg-white p-6 border border-gray-300 shadow-sm mb-8 border-l-4 border-l-equibase-green">
            <div class="w-full md:w-1/2">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Select Upcoming Race</label>
                <select id="raceSelector" disabled class="w-full p-2 border border-gray-300 bg-gray-50 text-gray-800 font-semibold focus:outline-none focus:border-equibase-green focus:ring-1 focus:ring-equibase-green disabled:opacity-50">
                    <option value="">Loading...</option>
                </select>
            </div>
        </div>

        <div id="cardGrid" class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        </div>
    </main>

    <script>
        // Converts Excel serial date (e.g., 46106) to a JS Date object
        function excelToDate(excelDate) {
            // 25569 is the number of days between Excel epoch and Unix epoch
            return new Date((excelDate - 25569) * 86400 * 1000);
        }

        let horseData = [];
        let validImageUrls = {}; // Stores the exact working URL for each horse

        // Fetch Data and Pre-load Images
        fetch('./races.json')
            .then(response => response.json())
            .then(data => {
                horseData = data.filter(h => h.OVR !== "No GPS Data");
                preloadImagesAndInitialize();
            })
            .catch(err => {
                const selector = document.getElementById('raceSelector');
                selector.innerHTML = '<option value="">Error loading data.</option>';
            });

        async function preloadImagesAndInitialize() {
            const uniqueHorses = [...new Set(horseData.map(h => h.horse_name))];

            // The Multi-Try Loader (Checks various file name formats)
            const imagePromises = uniqueHorses.map(name => {
                return new Promise(resolve => {
                    const formats = [
                        name.toLowerCase().trim(),                         // "so so"
                        name.toLowerCase().replace(/[^a-z0-9]/g, ''),      // "soso"
                        name.trim(),                                       // "So So"
                        name.replace(/\s+/g, '_').toLowerCase()            // "so_so"
                    ];

                    let tryIndex = 0;

                    function attemptNext() {
                        if (tryIndex >= formats.length) {
                            resolve(); // All attempts failed, move on
                            return;
                        }
                        const img = new Image();
                        const testUrl = `./images/${formats[tryIndex]}.png`;

                        img.onload = () => {
                            validImageUrls[name] = testUrl; // It worked! Save the winning URL
                            resolve();
                        };
                        img.onerror = () => {
                            tryIndex++;
                            attemptNext(); // Try the next format in the list
                        };
                        img.src = testUrl;
                    }

                    attemptNext(); // Start the testing loop
                });
            });

            await Promise.all(imagePromises);
            buildAndSortDropdown();
        }

        function buildAndSortDropdown() {
            const raceStats = {};

            horseData.forEach(h => {
                // Convert the number 46106 to a real date object first
                const realDate = excelToDate(h.race_date);
                const dateStr = realDate.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric'
                });

                const raceKey = `${h.track_id} - ${dateStr} - Race ${h.race_number}`;
                const raceKey = `${h.track_id} - ${dateStr} - Race ${h.race_number}`;

                if (!raceStats[raceKey]) {
                    raceStats[raceKey] = { key: raceKey, count: 0, horses: 0 };
                }

                raceStats[raceKey].horses += 1;
                // If the horse name is in our valid URLs dictionary, increment the count
                if (validImageUrls[h.horse_name]) {
                    raceStats[raceKey].count += 1;
                }
            });

            // Sort by most photos first, then by most horses
            const sortedRaces = Object.values(raceStats).sort((a, b) => {
                if (b.count !== a.count) return b.count - a.count;
                return b.horses - a.horses;
            });

            const selector = document.getElementById('raceSelector');
            selector.innerHTML = '<option value="">-- Select a Race Card --</option>';

            sortedRaces.forEach(race => {
                const photoText = race.count > 0 ? `(${race.count} Photos)` : ``;
                selector.innerHTML += `<option value="${race.key}">${race.key} ${photoText}</option>`;
            });

            selector.disabled = false;
            selector.addEventListener('change', (e) => renderCards(e.target.value));

            // Automatically load the top race
            if (sortedRaces.length > 0) {
                selector.value = sortedRaces[0].key;
                renderCards(sortedRaces[0].key);
            }
        }

        function renderCards(selectedRaceKey) {
            const grid = document.getElementById('cardGrid');
            grid.innerHTML = '';

            const filteredHorses = horseData.filter(h => {
                const realDate = excelToDate(h.race_date);
                const dateStr = realDate.toLocaleDateString('en-US', {
                    month: 'short',
                    day: 'numeric'
                });

                const raceKey = `${h.track_id} - ${dateStr} - Race ${h.race_number}`;
                return raceKey === selectedRaceKey;
            });

            // Sort by OVR highest to lowest
            filteredHorses.sort((a, b) => parseInt(b.OVR) - parseInt(a.OVR));

            filteredHorses.forEach(horse => {
                const imageUrl = validImageUrls[horse.horse_name];

                // Changed to object-contain and absolute positioning so it perfectly fits the left column
                const imageSection = imageUrl
                    ? `<img src="${imageUrl}" alt="${horse.horse_name}" class="absolute inset-0 w-full h-full object-contain object-center p-2">`
                    : `<div class="absolute inset-0 bg-gray-100 flex flex-col items-center justify-center text-gray-400">
                           <svg class="w-8 h-8 sm:w-12 sm:h-12 mb-1 sm:mb-2 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2-2v12a2 2 0 002 2z"></path></svg>
                           <span class="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-center">No Photo</span>
                       </div>`;

                const badges = horse.Tags.split(',').map(tag => {
                    if (tag.trim() === "N/A" || tag.trim() === "Standard Prospect") return '';
                    return `<span class="bg-equibase-light text-equibase-green px-1.5 py-0.5 sm:px-2 sm:py-0.5 rounded text-[10px] sm:text-xs font-bold border border-equibase-green whitespace-nowrap">${tag.trim()}</span>`;
                }).join('');

                const cardHTML = `
                    <div class="bg-white border border-gray-300 shadow-sm flex flex-row overflow-hidden hover:shadow-md transition-shadow relative min-h-[160px]">
                        
                        <div class="absolute top-0 left-0 bg-equibase-green text-white text-lg sm:text-xl font-black px-2 py-1 border-b-2 border-r-2 border-equibase-accent z-10 shadow-sm">
                            ${horse.OVR}
                        </div>

                        <div class="w-[35%] sm:w-2/5 border-r border-gray-200 relative bg-gray-50 flex-shrink-0">
                            ${imageSection}
                        </div>
                        
                        <div class="w-[65%] sm:w-3/5 p-3 sm:p-4 flex flex-col justify-center">
                            <div>
                                <h2 class="text-lg sm:text-2xl font-black uppercase text-gray-900 leading-tight mb-0.5">${horse.horse_name}</h2>
                                <p class="text-xs sm:text-sm text-equibase-green font-bold italic mb-3">${horse.Archetype}</p>
                                
                                <table class="w-full stat-table mb-3">
                                    <thead>
                                        <tr>
                                            <th class="px-0.5 sm:px-2 text-[10px] sm:text-xs">SPD</th>
                                            <th class="px-0.5 sm:px-2 text-[10px] sm:text-xs">STR</th>
                                            <th class="px-0.5 sm:px-2 text-[10px] sm:text-xs">STA</th>
                                            <th class="px-0.5 sm:px-2 text-[10px] sm:text-xs">EFF</th>
                                            <th class="px-0.5 sm:px-2 text-[10px] sm:text-xs">CLS</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr>
                                            <td class="font-bold text-gray-800 text-xs sm:text-base px-0.5 sm:px-2">${horse.SPD}</td>
                                            <td class="font-bold text-gray-800 text-xs sm:text-base px-0.5 sm:px-2">${horse.STR}</td>
                                            <td class="font-bold text-gray-800 text-xs sm:text-base px-0.5 sm:px-2">${horse.STA}</td>
                                            <td class="font-bold text-gray-800 text-xs sm:text-base px-0.5 sm:px-2">${horse.EFF}</td>
                                            <td class="font-bold text-gray-800 text-xs sm:text-base px-0.5 sm:px-2">${horse.CLS}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                            
                            <div class="flex flex-wrap gap-1">
                                ${badges}
                            </div>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }
    </script>
</body>
</html>
